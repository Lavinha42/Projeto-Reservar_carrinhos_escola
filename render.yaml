services:
  - type: web
    name: reservar-carrinhos
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn configuracao.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: IS_PRODUCTION
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: reservar-carrinhos-db
          property: connectionString

databases:
  - name: reservar-carrinhos-db
    databaseName: reservas
    user: reservas_user