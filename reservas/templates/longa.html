{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tela de Login</title>
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
  

</head>
<body>
<div class="login-box">
    <h2>Login</h2>

    <form method="POST" action="{% url 'longa' %}">
        {% csrf_token %} 
        <div class="input-box">
            <input type="text" name="usuario" placeholder="Usuário" required>
        </div>

        <div class="input-box">
            <input type="password" name="senha" placeholder="Senha" required>
        </div>

        <button type="submit" class="login-btn">Entrar</button>

        <div class="footer">
            <p>Não tem conta? <a href="{% url 'index' %}">Criar conta</a></p>
        </div>
    </form>
    
    <div class="divisor"><span>ou</span></div>

    <a href="{% url 'mural_consulta' %}" class="btn-mural">Ver Mural de Reservas</a>

    {% if messages %}
        <div style="color: red; text-align: center; margin-top: 15px; font-size: 14px;">
        {% for message in messages %}
            {{ message }}
        {% endfor %}
        </div>
    {% endif %}
</div>

</body>
</html>
