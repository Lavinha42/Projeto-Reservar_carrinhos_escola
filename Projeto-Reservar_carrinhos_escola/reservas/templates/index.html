<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <style>
    @charset "UTF-8";

*{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f2f5f9;
    }

    .container{
      background: white;
      width: 400px;
      padding: 35px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    h1{
      text-align: center;
      margin-bottom: 25px;
      color: #1e3a5f;
    }

    form{
      display: flex;
      flex-direction: column;
    }

    label{
      margin-bottom: 5px;
      margin-top: 10px;
      color: #333;
      font-weight: bold;
    }

    input{
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
    }

    input:focus{
      border-color: #1e88e5;
    }

    button{
      margin-top: 25px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #1e88e5;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover{
      background: #1565c0;
    }

    .login-link{
      text-align: center;
      margin-top: 15px;
    }

    .login-link a{
      text-decoration: none;
      color: #1e88e5;
      font-weight: bold;
    }
    .btn-link {
      display: inline-block;
      padding: 10px 20px;
      background-color: #f0f0f0;
      color: #333;
      text-decoration: none;
      border-radius: 5px;
      text-align: center;
      margin-top: 10px;
    }

    .btn-link:hover {
      background-color: #ddd;
    }
  </style>
    <div class="container">
      <h1>Cadastro</h1>
      <form method="POST" action="{% url 'index' %}">
        {% csrf_token %}
          
        <label>Usuário</label>
        <input type="text" name="usuario" placeholder="Digite como você quer ser chamado" required>

        <label>Email</label>
        <input type="email" name="email" placeholder="Digite seu email escolar" required>

        <label>Senha</label>
        <input type="password" name="senha" placeholder="Digite sua senha" required>

        <label>Confirmar Senha</label>
        <input type="password" name="confirmar_senha" placeholder="Confirme sua senha" required>
        
        <button type="submit">Cadastrar</button>
        <div class="login-link">
          <a href="{% url 'longa' %}">Já tem conta? Entrar</a>
        </div>
      </form>

        <!-- Espaço para mensagens de erro -->
        {% if messages %}
        <div style="margin-top: 15px; color: red; text-align: center;">
          {% for message in messages %}
          {{ message }}
          {% endfor %}
        </div>
      {% endif %}
    </div> <!-- Fechamento correto da container -->
</body>
</html>
